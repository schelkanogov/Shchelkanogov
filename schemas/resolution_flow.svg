<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Inter','Arial',sans-serif">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f472b6"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad2)" rx="16"/>
  <pattern id="grid2" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(33,160,56,0.05)" stroke-width="0.5"/>
  </pattern>
  <rect width="900" height="620" fill="url(#grid2)"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700" letter-spacing="3">ГОСТ 19.701-90 · ПОСЛЕДОВАТЕЛЬНОСТЬ ОПЕРАЦИЙ</text>
  <text x="450" y="52" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="900">Жизненный Цикл Инцидента</text>

  <!-- Participant boxes -->
  <!-- Сенсоры -->
  <rect x="30" y="70" width="100" height="40" rx="6" fill="rgba(56,189,248,0.12)" stroke="#38bdf8" stroke-width="1"/>
  <text x="80" y="88" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="700">Сетевые</text>
  <text x="80" y="100" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="700">Сенсоры</text>
  <line x1="80" y1="110" x2="80" y2="530" stroke="#38bdf8" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Ядро -->
  <rect x="185" y="70" width="100" height="40" rx="6" fill="rgba(14,165,233,0.15)" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="235" y="88" text-anchor="middle" fill="#0ea5e9" font-size="9" font-weight="700">Ядро</text>
  <text x="235" y="100" text-anchor="middle" fill="#0ea5e9" font-size="9" font-weight="700">Детектора</text>
  <line x1="235" y1="110" x2="235" y2="530" stroke="#0ea5e9" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- ИИ -->
  <rect x="345" y="70" width="110" height="40" rx="6" fill="rgba(33,160,56,0.15)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="88" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="700">Нейросеть</text>
  <text x="400" y="100" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="700">(GigaChat)</text>
  <line x1="400" y1="110" x2="400" y2="530" stroke="#22c55e" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Оркестратор -->
  <rect x="510" y="70" width="110" height="40" rx="6" fill="rgba(163,230,53,0.12)" stroke="#a3e635" stroke-width="1"/>
  <text x="565" y="88" text-anchor="middle" fill="#a3e635" font-size="9" font-weight="700">Модуль</text>
  <text x="565" y="100" text-anchor="middle" fill="#a3e635" font-size="9" font-weight="700">Оркестрации</text>
  <line x1="565" y1="110" x2="565" y2="530" stroke="#a3e635" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Бот -->
  <rect x="670" y="70" width="90" height="40" rx="6" fill="rgba(244,114,182,0.12)" stroke="#f472b6" stroke-width="1"/>
  <text x="715" y="88" text-anchor="middle" fill="#f472b6" font-size="9" font-weight="700">Telegram</text>
  <text x="715" y="100" text-anchor="middle" fill="#f472b6" font-size="9" font-weight="700">Бот</text>
  <line x1="715" y1="110" x2="715" y2="530" stroke="#f472b6" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- ИБ Офицер -->
  <rect x="800" y="70" width="85" height="40" rx="6" fill="rgba(148,163,184,0.12)" stroke="#94a3b8" stroke-width="1"/>
  <text x="842" y="88" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="700">ИБ</text>
  <text x="842" y="100" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="700">Офицер</text>
  <line x1="842" y1="110" x2="842" y2="530" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Activation bars -->
  <rect x="230" y="130" width="10" height="360" rx="3" fill="rgba(14,165,233,0.2)" stroke="#0ea5e9" stroke-width="0.5"/>
  <rect x="395" y="170" width="10" height="130" rx="3" fill="rgba(33,160,56,0.2)" stroke="#22c55e" stroke-width="0.5"/>
  <rect x="560" y="320" width="10" height="180" rx="3" fill="rgba(163,230,53,0.15)" stroke="#a3e635" stroke-width="0.5"/>

  <!-- 1. Sensors → Core: Обнаружение -->
  <line x1="80" y1="135" x2="228" y2="135" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrC)"/>
  <text x="154" y="130" text-anchor="middle" fill="#7dd3fc" font-size="9" font-weight="600">Обнаружение уязвимости (ИОК)</text>

  <!-- 2. Core → Core: Анализ ФСТЭК -->
  <path d="M 240 160 Q 280 160 280 175 Q 280 190 240 190" fill="none" stroke="#0ea5e9" stroke-width="1" marker-end="url(#arrC)"/>
  <text x="290" y="178" fill="#7dd3fc" font-size="8.5" font-weight="600">Анализ на базе ФСТЭК БДУ</text>

  <!-- 3. Core → AI: Запрос валидации -->
  <line x1="240" y1="210" x2="393" y2="210" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="318" y="205" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">Запрос подтверждения</text>

  <!-- 4. AI self: Анализ структуры -->
  <path d="M 405 225 Q 440 225 440 237 Q 440 250 405 250" fill="none" stroke="#22c55e" stroke-width="1" marker-end="url(#arrG)"/>
  <text x="448" y="240" fill="#86efac" font-size="8.5" font-weight="600">Анализ структуры</text>

  <!-- 5. AI → Core: Подтверждено -->
  <line x1="393" y1="265" x2="240" y2="265" stroke="#22c55e" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrC)"/>
  <text x="318" y="260" text-anchor="middle" fill="#a3e635" font-size="9" font-weight="600">Вывод: Подтверждено ✓</text>

  <!-- 6. Core → AI: Генерация скрипта -->
  <line x1="240" y1="285" x2="393" y2="285" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="318" y="280" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">Генерация скрипта</text>

  <!-- 7. AI → Core: Готовый скрипт -->
  <line x1="393" y1="300" x2="240" y2="300" stroke="#a3e635" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrC)"/>
  <text x="318" y="315" text-anchor="middle" fill="#a3e635" font-size="9" font-weight="600">Готовый скрипт исправления</text>

  <!-- 8. Core → Orchestrator: Передача инцидента -->
  <line x1="240" y1="340" x2="558" y2="340" stroke="#a3e635" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="400" y="335" text-anchor="middle" fill="#d9f99d" font-size="9" font-weight="600">Передача инцидента</text>

  <!-- 9. Orchestrator self: Оформление задачи -->
  <path d="M 570 355 Q 610 355 610 367 Q 610 380 570 380" fill="none" stroke="#a3e635" stroke-width="1" marker-end="url(#arrG)"/>
  <text x="618" y="370" fill="#d9f99d" font-size="8.5" font-weight="600">Оформление задачи</text>

  <!-- 10. Orchestrator → Bot: Алерт -->
  <line x1="570" y1="395" x2="713" y2="395" stroke="#f472b6" stroke-width="1.5" marker-end="url(#arrP)"/>
  <text x="640" y="390" text-anchor="middle" fill="#fda4af" font-size="9" font-weight="600">Алерт с решением</text>

  <!-- 11. Bot → CISO: Критическая уязвимость -->
  <line x1="715" y1="415" x2="840" y2="415" stroke="#f472b6" stroke-width="1.5" marker-end="url(#arrP)"/>
  <text x="778" y="410" text-anchor="middle" fill="#fda4af" font-size="8" font-weight="600">«Патч готов»</text>

  <!-- 12. CISO → Bot: Утвердить -->
  <line x1="840" y1="435" x2="715" y2="435" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrP)"/>
  <text x="778" y="452" text-anchor="middle" fill="#e2e8f0" font-size="8" font-weight="700">«Утвердить и Применить» ✓</text>

  <!-- 13. Bot → Orchestrator: Одобрение -->
  <line x1="713" y1="460" x2="570" y2="460" stroke="#f472b6" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrG)"/>
  <text x="640" y="475" text-anchor="middle" fill="#fda4af" font-size="8.5" font-weight="600">Сигнал одобрения</text>

  <!-- 14. Orchestrator self: Применение -->
  <path d="M 570 482 Q 610 482 610 492 Q 610 502 570 502" fill="none" stroke="#a3e635" stroke-width="1" marker-end="url(#arrG)"/>
  <text x="618" y="495" fill="#d9f99d" font-size="8.5" font-weight="600">Применение скрипта</text>

  <!-- 15. Orchestrator → Core: Сводка -->
  <line x1="558" y1="510" x2="240" y2="510" stroke="#a3e635" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrC)"/>
  <text x="400" y="525" text-anchor="middle" fill="#d9f99d" font-size="9" font-weight="600">Сводка о резолюции</text>

  <!-- Time indicator -->
  <text x="16" y="135" fill="#475569" font-size="8" font-weight="600">t=0</text>
  <text x="16" y="510" fill="#475569" font-size="8" font-weight="600">t=10с</text>
  <line x1="25" y1="140" x2="25" y2="505" stroke="#334155" stroke-width="1" marker-end="url(#arrR)"/>

  <!-- Footer -->
  <text x="880" y="608" text-anchor="end" fill="#475569" font-size="9" font-weight="600" letter-spacing="1">VULNDETECTOR // SBER500</text>
</svg>
