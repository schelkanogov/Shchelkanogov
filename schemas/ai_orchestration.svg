<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="'Inter','Arial',sans-serif">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="ac" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="ap" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f472b6"/>
    </marker>
    <marker id="ay" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a3e635"/>
    </marker>
    <filter id="gl">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="url(#bgGrad3)" rx="16"/>
  <pattern id="grid3" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(33,160,56,0.05)" stroke-width="0.5"/>
  </pattern>
  <rect width="900" height="580" fill="url(#grid3)"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700" letter-spacing="3">ГОСТ 19.404-79 · ОРКЕСТРАЦИЯ</text>
  <text x="450" y="52" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="900">Схема Интеллектуальной Оркестрации</text>

  <!-- NODE 1: Система Управления Инцидентами -->
  <rect x="40" y="80" width="370" height="200" rx="14" fill="rgba(30,41,59,0.7)" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="55" y="100" fill="#0ea5e9" font-size="10" font-weight="800" letter-spacing="2">СИСТЕМА УПРАВЛЕНИЯ ИНЦИДЕНТАМИ</text>
  
  <!-- Логическое Ядро -->
  <rect x="60" y="115" width="170" height="65" rx="10" fill="rgba(14,165,233,0.12)" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="145" y="145" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">Логическое Ядро</text>
  <text x="145" y="162" text-anchor="middle" fill="#64748b" font-size="10">(Оркестратор задач)</text>

  <!-- Бот Утверждения -->
  <rect x="60" y="195" width="170" height="65" rx="10" fill="rgba(244,114,182,0.1)" stroke="#f472b6" stroke-width="1.2"/>
  <text x="145" y="225" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="700">Бот Утверждения</text>
  <text x="145" y="242" text-anchor="middle" fill="#64748b" font-size="10">(Канал связи)</text>

  <!-- Connection: KB → TgDaemon -->
  <line x1="145" y1="180" x2="145" y2="195" stroke="#38bdf8" stroke-width="1.2" marker-end="url(#ac)"/>

  <!-- NODE 2: База Данных Задач -->
  <rect x="500" y="80" width="360" height="110" rx="14" fill="rgba(30,41,59,0.7)" stroke="#a3e635" stroke-width="1.5"/>
  <text x="515" y="100" fill="#a3e635" font-size="10" font-weight="800" letter-spacing="2">БАЗА ДАННЫХ ЗАДАЧ (SQLITE)</text>
  
  <!-- Artifact: Карточка -->
  <rect x="530" y="115" width="180" height="48" rx="8" fill="rgba(163,230,53,0.1)" stroke="#a3e635" stroke-width="1"/>
  <!-- Folded corner -->
  <path d="M 690 115 L 710 115 L 710 135 Z" fill="rgba(163,230,53,0.15)" stroke="#a3e635" stroke-width="0.8"/>
  <text x="620" y="140" text-anchor="middle" fill="#d9f99d" font-size="11" font-weight="700">Карточка Инцидента</text>
  <text x="620" y="155" text-anchor="middle" fill="#64748b" font-size="9">(Задача)</text>

  <!-- NODE 3: Нейросеть СберБанка -->
  <rect x="500" y="220" width="360" height="110" rx="14" fill="rgba(30,41,59,0.7)" stroke="#22c55e" stroke-width="1.5"/>
  <!-- Cloud shape hint -->
  <text x="515" y="240" fill="#22c55e" font-size="10" font-weight="800" letter-spacing="2">НЕЙРОСЕТЬ СБЕРБАНКА ☁</text>
  
  <rect x="530" y="255" width="180" height="48" rx="8" fill="rgba(33,160,56,0.15)" stroke="#22c55e" stroke-width="1.2"/>
  <text x="620" y="280" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="800">Языковая Модель</text>
  <text x="620" y="296" text-anchor="middle" fill="#86efac" font-size="10">(GigaChat)</text>

  <!-- NODE 4: Инженер Безопасности -->
  <rect x="500" y="365" width="360" height="100" rx="14" fill="rgba(30,41,59,0.7)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="515" y="385" fill="#94a3b8" font-size="10" font-weight="800" letter-spacing="2">ТЕЛЕКОМ-ИНФРАСТРУКТУРА</text>
  
  <!-- Actor icon -->
  <circle cx="555" cy="415" r="10" fill="none" stroke="#e2e8f0" stroke-width="1.2"/>
  <line x1="555" y1="425" x2="555" y2="445" stroke="#e2e8f0" stroke-width="1.2"/>
  <line x1="545" y1="435" x2="565" y2="435" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="580" y="430" fill="#e2e8f0" font-size="12" font-weight="700">Инженер Безопасности</text>
  <text x="580" y="446" fill="#64748b" font-size="9">(ИБ Специалист)</text>

  <!-- ARROWS between nodes -->
  
  <!-- KB → Task: Регистрация уязвимости -->
  <path d="M 230 140 L 530 140" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#ac)" filter="url(#gl)"/>
  <rect x="300" y="120" width="180" height="17" rx="4" fill="rgba(10,15,26,0.9)"/>
  <text x="390" y="133" text-anchor="middle" fill="#7dd3fc" font-size="9" font-weight="600">Регистрация уязвимости</text>

  <!-- KB → LLM: Отправка контекста -->
  <path d="M 230 165 Q 430 165 430 270 L 530 270" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)" filter="url(#gl)"/>
  <rect x="420" y="195" width="175" height="17" rx="4" fill="rgba(10,15,26,0.9)"/>
  <text x="508" y="208" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">Отправка контекста инцидента</text>

  <!-- LLM → KB: Возврат скрипта -->
  <path d="M 530 290 Q 430 290 430 170 L 230 170" fill="none" stroke="#a3e635" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#ac)"/>
  <rect x="260" y="173" width="170" height="17" rx="4" fill="rgba(10,15,26,0.9)"/>
  <text x="345" y="186" text-anchor="middle" fill="#a3e635" font-size="9" font-weight="600">Возврат скрипта (Готовый код)</text>

  <!-- KB → TgDaemon: Сигнал готовности-->
  <text x="250" y="215" fill="#f472b6" font-size="8.5" font-weight="600">Сигнал готовности к деплою ↓</text>

  <!-- TgDaemon → SecEng: Push-кнопка -->
  <path d="M 230 230 Q 330 350 530 415" fill="none" stroke="#f472b6" stroke-width="1.5" marker-end="url(#ap)"/>
  <rect x="320" y="340" width="190" height="17" rx="4" fill="rgba(10,15,26,0.9)"/>
  <text x="415" y="353" text-anchor="middle" fill="#fda4af" font-size="9" font-weight="600">Push: «Утвердить и Исправить»</text>

  <!-- SecEng → TgDaemon: Подтверждение -->
  <path d="M 530 435 Q 330 435 230 250" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#ac)"/>
  <rect x="270" y="370" width="170" height="17" rx="4" fill="rgba(10,15,26,0.9)"/>
  <text x="355" y="383" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="600">Подтверждение авторизации</text>

  <!-- KB → Task: Статус: Выполнено -->
  <rect x="280" y="82" width="140" height="20" rx="4" fill="rgba(33,160,56,0.15)" stroke="#22c55e" stroke-width="0.8"/>
  <text x="350" y="96" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="700">Статус: ВЫПОЛНЕНО ✓</text>

  <!-- Status indicator -->
  <rect x="40" y="500" width="820" height="44" rx="10" fill="rgba(33,160,56,0.08)" stroke="#22c55e" stroke-width="1"/>
  <text x="450" y="526" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="800" letter-spacing="2">ПОЛНЫЙ ЦИКЛ: ОБНАРУЖЕНИЕ → АНАЛИЗ → ПАТЧ → УТВЕРЖДЕНИЕ → ЗАКРЫТИЕ = 10 СЕКУНД</text>

  <!-- Footer -->
  <text x="880" y="568" text-anchor="end" fill="#475569" font-size="9" font-weight="600" letter-spacing="1">VULNDETECTOR // SBER500</text>
</svg>
